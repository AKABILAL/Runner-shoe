<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeleMIS Pro | Telecom MIS with File Analysis</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- SheetJS for Excel/CSV Parsing -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <!-- PapaParse for CSV -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <!-- FileSaver for Downloads -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .gradient-bg { background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%); }
        .card { transition: transform 0.2s, box-shadow 0.2s; }
        .card:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(0,0,0,0.15); }
        .sidebar { min-height: 100vh; }
        .nav-item { transition: all 0.3s; }
        .nav-item:hover { background: rgba(255,255,255,0.1); }
        .nav-item.active { background: rgba(255,255,255,0.2); border-left: 4px solid #60a5fa; }
        .file-drop-area { border: 2px dashed #cbd5e1; transition: all 0.3s; }
        .file-drop-area.dragover { border-color: #3b82f6; background: #eff6ff; }
        .loading-overlay { background: rgba(255,255,255,0.9); }
        .progress-bar { transition: width 0.3s ease; }
    </style>
</head>
<body class="bg-gray-100">
    <div class="flex">
        <!-- Sidebar -->
        <div class="sidebar gradient-bg text-white w-64 hidden md:block">
            <div class="p-6">
                <h1 class="text-2xl font-bold"><i class="fas fa-signal"></i> TeleMIS Pro</h1>
                <p class="text-sm opacity-80 mt-1">File Analysis & Dashboard</p>
            </div>
            <nav class="mt-6">
                <a href="#" class="nav-item active block py-3 px-6" onclick="showSection('dashboard')"><i class="fas fa-tachometer-alt mr-3"></i>Dashboard</a>
                <a href="#" class="nav-item block py-3 px-6" onclick="showSection('upload')"><i class="fas fa-file-upload mr-3"></i>Upload File</a>
                <a href="#" class="nav-item block py-3 px-6" onclick="showSection('analysis')"><i class="fas fa-chart-pie mr-3"></i>Analysis Results</a>
                <a href="#" class="nav-item block py-3 px-6" onclick="showSection('reports')"><i class="fas fa-file-download mr-3"></i>Download Reports</a>
                <a href="#" class="nav-item block py-3 px-6" onclick="showSection('settings')"><i class="fas fa-cog mr-3"></i>Settings</a>
            </nav>
            <div class="absolute bottom-6 left-6 right-6">
                <div class="bg-white/10 rounded-lg p-4">
                    <p class="text-sm">System Status</p>
                    <p class="text-green-400 text-xs mt-1"><i class="fas fa-circle"></i> Online</p>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="flex-1">
            <!-- Top Bar -->
            <header class="bg-white shadow-sm">
                <div class="flex justify-between items-center p-6">
                    <div class="md:hidden">
                        <button onclick="toggleSidebar()" class="text-gray-600"><i class="fas fa-bars text-xl"></i></button>
                    </div>
